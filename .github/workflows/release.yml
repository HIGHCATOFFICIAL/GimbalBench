name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: GimbalBench-linux
          - os: windows-latest
            artifact: GimbalBench-windows
          - os: macos-latest
            artifact: GimbalBench-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxcb-cursor0

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python build.py

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x dist/GimbalBench
          tar -czf dist/GimbalBench-linux.tar.gz -C dist GimbalBench

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x dist/GimbalBench
          tar -czf dist/GimbalBench-macos.tar.gz -C dist GimbalBench

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/GimbalBench.exe -DestinationPath dist/GimbalBench-windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/GimbalBench-*.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.SUBMODULE_PAT }}
          generate_release_notes: true
          files: |
            artifacts/**/*

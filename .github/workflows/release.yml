name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: GimbalBench-linux
            exe: dist/GimbalBench
          - os: windows-latest
            artifact: GimbalBench-windows
            exe: dist/GimbalBench.exe
          - os: macos-latest
            artifact: GimbalBench-macos
            exe: dist/GimbalBench

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxcb-cursor0

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python build.py

      - name: Rename artifact (Linux)
        if: runner.os == 'Linux'
        run: mv dist/GimbalBench dist/GimbalBench-linux

      - name: Rename artifact (macOS)
        if: runner.os == 'macOS'
        run: mv dist/GimbalBench dist/GimbalBench-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.exe }}*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/GimbalBench-linux/*
            artifacts/GimbalBench-windows/*
            artifacts/GimbalBench-macos/*
